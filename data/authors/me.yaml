bio: |
  Ming Chen is a PhD candidate in Education at the School of Education,
  University of Bristol. His research focuses on technology-enhanced
  language learning, with particular interests in virtual reality,
  artificial intelligence in English as a foreign language contexts.

  His doctoral research investigates how Virtual Reality Digital Content
  Creation can support vocabulary consolidation and student engagement in
  classroom-based EFL learning. More broadly, his work explores how emerging
  technologies can be designed and integrated meaningfully into language
  education.

